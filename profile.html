<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profile</title>

<style>

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0f172a;
  color:white;
}

.profile-box{
  width:350px;
  margin:100px auto;
  background:#1e293b;
  padding:30px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}

img{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  margin-bottom:20px;
}

h1{
  margin:10px 0;
}

p{
  color:#cbd5e1;
}

button{
  margin-top:20px;
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:#38bdf8;
  color:white;
  cursor:pointer;
  font-size:16px;
}

button:hover{
  background:#0ea5e9;
}

</style>
</head>

<body>

<div class="profile-box">

<img src="https://i.imgur.com/6VBx3io.png">

<h1>Welcome Induwara</h1>

<p>Your account is successfully logged in.</p>

<button onclick="logout()">
Logout
</button>

</div>

<script>

function logout(){

  alert("Logged Out");

  window.location.href = "login.html";

}

</script>

</body>
</html>
