<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<style>

body{
  font-family: Arial, sans-serif;
  background: #0f172a;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.login-box{
  background: #1e293b;
  padding: 40px;
  border-radius: 20px;
  width: 320px;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

h2{
  color: white;
  text-align: center;
  margin-bottom: 20px;
}

input{
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  border: none;
  border-radius: 10px;
  outline: none;
  box-sizing: border-box;
}

button{
  width: 100%;
  padding: 12px;
  margin-top: 20px;
  border: none;
  border-radius: 10px;
  background: #38bdf8;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover{
  background: #0ea5e9;
}

</style>
</head>

<body>

<div class="login-box">

<h2>Login</h2>

<input
type="email"
id="email"
placeholder="Enter Email"
required
>

<input
type="password"
id="password"
placeholder="Enter Password"
required
>

<button id="loginBtn">
Login
</button>

</div>


<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


const firebaseConfig = {
apiKey: "AIzaSyC1xJ34Gx5xZGbFCIGOWjhjwMCfKTNPgVk",
authDomain: "induwaraportfolio-d8d82.firebaseapp.com",
projectId: "induwaraportfolio-d8d82",
storageBucket: "induwaraportfolio-d8d82.firebasestorage.app",
messagingSenderId: "72123389540",
appId: "1:72123389540:web:f395f661a90d9cf00df589",
measurementId: "G-J5V705HEV2"
};


const app = initializeApp(firebaseConfig);

const auth = getAuth(app);


document
.getElementById("loginBtn")
.addEventListener("click", async () => {

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

try{

await signInWithEmailAndPassword(
auth,
email,
password
);

alert("Login Successful!");

window.location.replace("index.html");

}catch(error){

alert(error.message);

console.log(error);

}

});

</script>

</body>
</html>
