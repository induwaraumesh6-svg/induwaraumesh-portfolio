<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<style>

body{
  font-family: Arial, sans-serif;
  background: #0f172a;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.login-box{
  background: #1e293b;
  padding: 40px;
  border-radius: 20px;
  width: 320px;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

h2{
  color: white;
  text-align: center;
  margin-bottom: 20px;
}

input{
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  border: none;
  border-radius: 10px;
  outline: none;
  box-sizing: border-box;
}

button{
  width: 100%;
  padding: 12px;
  margin-top: 20px;
  border: none;
  border-radius: 10px;
  background: #38bdf8;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover{
  background: #0ea5e9;
}

</style>
</head>

<body>

<div class="login-box">

  <h2>Login</h2>

  <form onsubmit="handleLogin(event)">

    <input
      type="email"
      id="email"
      placeholder="Enter Email"
      required
    >

    <input
      type="password"
      id="password"
      placeholder="Enter Password"
      required
    >

    <button type="submit">
      Login
    </button>

  </form>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
