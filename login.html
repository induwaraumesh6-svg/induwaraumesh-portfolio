<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body{
font-family:Arial;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.login-box{
background:#1e293b;
padding:40px;
border-radius:20px;
width:320px;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

h2{
color:white;
text-align:center;
}

input{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
}

button{
width:100%;
padding:12px;
margin-top:20px;
border:none;
border-radius:10px;
background:#38bdf8;
color:white;
font-size:16px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="login-box">
<h2>Login</h2>

<input type="email" id="loginEmail" placeholder="Email">

<input type="password" id="loginPassword" placeholder="Password">

<button onclick="handleLogin()">Login</button>
</div>

<script type="module" src="script.js"></script>

</body>
</html>
